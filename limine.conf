# ============================================================
#  FunnyOS  –  Limine Boot Configuration
#  https://github.com/limine-bootloader/limine
# ============================================================

# Timeout before booting the default entry (0 = instant)
timeout: 3

# Default entry to boot
default_entry: 1

# ── Entry 1: FunnyOS ─────────────────────────────────────────────────────────
/FunnyOS
    comment: Minimal x86-64 shell OS
    protocol: limine
    path: boot():/boot/kernel.elf
    # Optional kernel command line
    cmdline: quiet
